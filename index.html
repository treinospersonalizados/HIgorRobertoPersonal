<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higor Roberto | Consultoria Fitness Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Fontes Profissionais -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .font-impact { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; }

        /* Fundo com Partículas Aleatórias */
        #particles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float-random linear infinite;
        }

        @keyframes float-random {
            from { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            to { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Banner Principal */
        .hero-section {
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop') center/cover;
            height: 80vh;
            display: flex;
            align-items: center;
            z-index: 1;
        }

        .logo-inline {
            height: 40px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        /* NOVA ANIMAÇÃO: Seta indicando para clicar em cima */
        .click-arrow {
            display: inline-block;
            margin-left: 5px;
            font-size: 0.8rem;
            animation: pointUp 0.8s infinite alternate;
        }

        @keyframes pointUp {
            0% { transform: translateY(0) rotate(-45deg); opacity: 0.5; }
            100% { transform: translateY(-5px) rotate(-45deg); opacity: 1; }
        }

        /* Rodapé Estilizado */
        .social-footer {
            border-top: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(to top, #0a0a0a, #000);
        }

        .nav-link {
            border: 1px solid transparent;
            padding: 5px 15px;
            transition: 0.4s;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .nav-link:hover {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            border-radius: 5px;
        }

        .btn-pulse {
            background: #22c55e;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 20px 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .card-aesthetic {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: 0.4s;
        }
        .card-aesthetic:hover {
            border-color: #3b82f6;
            transform: translateY(-5px);
        }

        .whatsapp-fixed {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #fff;
            z-index: 100;
            animation: pulse-simple 2s infinite;
        }
    </style>
</head>
<body class="bg-black">

    <div id="particles-container"></div>

    <header class="fixed w-full z-50 bg-black/90 border-b border-white/10 backdrop-blur-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-impact text-white flex items-center">
                <img src="logohigor.jpg" class="logo-inline" alt="HR Logo"> HIGOR ROBERTO
            </h1>
            <nav class="hidden md:flex space-x-4 items-center">
                <a href="#sobre" class="nav-link">Sobre</a>
                <a href="#servicos" class="nav-link">Serviços</a>
                <a href="#planos" class="nav-link">Planos</a>
                <a href="https://wa.me/5544988225166" target="_blank" class="btn-pulse px-6 py-2 rounded font-bold text-xs text-white">CONTATO</a>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-5xl md:text-8xl font-impact mb-4">Treino Inteligente,<br><span class="text-blue-500">Resultados Reais.</span></h2>
            <p class="text-lg md:text-xl text-gray-400 font-bold uppercase tracking-widest">Consultoria Online e Presencial | Maringá - PR</p>
            <div class="mt-10">
                <a href="#planos" class="bg-blue-600 px-10 py-4 rounded font-black hover:bg-blue-700 transition uppercase tracking-tighter">Começar Agora</a>
            </div>
        </div>
    </section>

    <!-- ... (Demais seções Sobre, Serviços e Planos mantidas) ... -->

    <!-- RODAPÉ ATUALIZADO CONFORME image_894674.png -->
    <footer class="social-footer py-16 text-center relative z-10">
        <div class="container mx-auto px-6">
            
            <div class="flex flex-wrap justify-center gap-12 md:gap-24 mb-12">
                <!-- Instagram -->
                <a href="https://www.instagram.com/higorobertoo.personal" target="_blank" class="group flex flex-col items-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="w-20 h-20 mb-4 group-hover:scale-110 transition duration-300" alt="Instagram">
                    <div class="flex items-center text-white font-bold text-sm tracking-tighter">
                        @HIGOROBERTOO.PERSONAL
                        <i class="fas fa-mouse-pointer click-arrow"></i>
                    </div>
                </a>

                <!-- WhatsApp -->
                <a href="https://wa.me/5544988225166" target="_blank" class="group flex flex-col items-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-20 h-20 mb-4 group-hover:scale-110 transition duration-300" alt="WhatsApp">
                    <div class="flex items-center text-white font-bold text-sm tracking-tighter">
                        WHATSAPP
                        <i class="fas fa-mouse-pointer click-arrow"></i>
                    </div>
                </a>
            </div>

            <div class="opacity-50">
                <h2 class="text-xl font-impact mb-2 flex justify-center items-center">
                    <img src="https://logohigor.jpg" class="logo-inline h-6" alt="HR Logo"> HIGOR ROBERTO
                </h2>
                <p class="text-[10px] uppercase tracking-[4px]">Bacharel Ed. Física UEM | Maringá - PR</p>
            </div>
        </div>
    </footer>

    <script>
        const container = document.getElementById('particles-container');
        const particleCount = 40;
        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '110vh';
            p.style.animationDuration = Math.random() * 10 + 8 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(p);
        }
    </script>
</body>
</html>
